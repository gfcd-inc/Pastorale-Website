<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1066" viewBox="0 0 1600 1066" role="img" aria-label="料理のイメージ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f6f1"/>
      <stop offset="0.7" stop-color="#f2eee5"/>
      <stop offset="1" stop-color="#efe7dc"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c26c3b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c26c3b" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="1066" fill="url(#bg)"/>

  <circle cx="1150" cy="320" r="210" fill="#304c3c" opacity="0.10" filter="url(#soft)"/>
  <circle cx="420" cy="260" r="180" fill="#c26c3b" opacity="0.10" filter="url(#soft)"/>

  <g transform="translate(260 260)">
    <rect x="0" y="230" width="1080" height="440" rx="34" fill="#1c1c1a" opacity="0.86"/>
    <rect x="30" y="260" width="1020" height="380" rx="26" fill="#0f0f0e" opacity="0.55"/>

    <g opacity="0.8">
      <circle cx="340" cy="440" r="120" fill="#c26c3b" opacity="0.35"/>
      <circle cx="520" cy="470" r="90" fill="#304c3c" opacity="0.35"/>
      <circle cx="670" cy="430" r="70" fill="#c26c3b" opacity="0.26"/>
      <circle cx="820" cy="480" r="110" fill="#304c3c" opacity="0.25"/>
    </g>

    <path d="M120 220 C 160 120, 260 110, 300 210" fill="none" stroke="url(#heat)" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
    <path d="M320 220 C 360 120, 460 110, 500 210" fill="none" stroke="url(#heat)" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
    <path d="M520 220 C 560 120, 660 110, 700 210" fill="none" stroke="url(#heat)" stroke-width="18" stroke-linecap="round" opacity="0.6"/>
  </g>

  <g fill="#1c1c1a" opacity="0.13">
    <path d="M1200 820 q50 -40 100 0 q-50 40 -100 0z"/>
    <path d="M1280 790 q34 -26 68 0 q-34 26 -68 0z"/>
  </g>
</svg>
